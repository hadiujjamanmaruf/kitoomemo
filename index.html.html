<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitoo Footwear — Purchase Memo</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf7f2; --paper: #ffffff; --ink: #1a1612; --accent: #b5451b;
  --gold: #c9922a; --muted: #7a6f64; --line: #e2d9cc; --soft: #f2ece3;
  --green: #2a6b45; --red: #c0392b; --shadow: 0 2px 20px rgba(0,0,0,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--ink); min-height: 100vh; }
.screen { display: none; }
.screen.active { display: block; }

/* ── LOGIN ── */
.login-wrapper { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
.login-box { background: var(--paper); padding: 40px; border-radius: 12px; box-shadow: var(--shadow); width: 100%; max-width: 400px; text-align: center; border: 1px solid var(--line); }
.login-brand { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; margin-bottom: 5px; }
.login-input { width: 100%; padding: 14px; margin-bottom: 15px; border: 1px solid var(--line); border-radius: 6px; background: var(--soft); outline: none; }
.login-btn-submit { width: 100%; background: var(--ink); color: #fff; border: none; padding: 14px; border-radius: 6px; font-weight: 600; cursor: pointer; }

/* ── DASHBOARD ── */
.dash-header { background: var(--ink); padding: 0 20px; display: flex; align-items: center; justify-content: space-between; height: 64px; position: sticky; top: 0; z-index: 50; }
.dash-brand-name { font-family: 'Playfair Display', serif; font-size: 20px; color: #fff; font-weight: 700; }
.dash-actions { display:flex; gap:8px; align-items:center; }
.dash-new-btn { background: var(--accent); color: #fff; border: none; font-size: 13px; font-weight: 600; padding: 8px 16px; border-radius: 40px; cursor: pointer; }
.backup-btn { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); font-size: 12px; padding: 6px 12px; border-radius: 40px; cursor: pointer; }

.dash-body { padding: 20px; max-width: 1000px; margin: 0 auto; }
.dash-stats { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
.stat-card { background: var(--paper); border: 1px solid var(--line); border-radius: 8px; padding: 15px; flex: 1; min-width: 120px; box-shadow: var(--shadow); }
.stat-val { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; color: var(--accent); }
.stat-label { font-size: 10px; text-transform: uppercase; color: var(--muted); }

.memo-card { background: var(--paper); border: 1px solid var(--line); border-radius: 8px; padding: 15px; display: flex; align-items: center; gap: 12px; margin-bottom: 10px; box-shadow: var(--shadow); }
.memo-card-info { flex: 1; min-width: 0; }
.memo-card-num { font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; color: var(--accent); background: var(--soft); padding: 2px 6px; border-radius: 4px; }
.memo-card-items { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.memo-card-actions { display: flex; gap: 6px; }
.icon-btn { border: 1px solid var(--line); background: var(--soft); border-radius: 6px; width: 32px; height: 32px; cursor: pointer; display:flex; align-items:center; justify-content:center; }

/* ── LOGS TABLE ── */
.log-row { font-size: 12px; border-bottom: 1px solid var(--line); padding: 10px 0; display: grid; grid-template-columns: 1fr 1fr 2fr; gap: 10px; }
.log-time { color: var(--muted); font-family: 'Space Mono', monospace; }
.log-user { font-weight: 600; color: var(--accent); }

/* ── EDITOR ── */
.editor-header { background: var(--ink); padding: 0 15px; display: flex; align-items: center; justify-content: space-between; height: 60px; color: #fff; }
.table-section { overflow-x: auto; padding: 20px 0; }
table { width: 100%; border-collapse: collapse; min-width: 600px; }
th { background: var(--ink); color: #fff; font-size: 10px; padding: 10px; text-align: left; }
td { padding: 8px; border-bottom: 1px solid var(--line); }
input { border: 1px solid transparent; width: 100%; padding: 5px; }
input:focus { border-color: var(--gold); outline: none; }

@media (max-width: 600px) {
  .memo-card { flex-direction: column; align-items: flex-start; }
  .memo-card-actions { width: 100%; justify-content: flex-end; border-top: 1px solid var(--soft); padding-top: 8px; }
}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="screen-login" class="screen active">
  <div class="login-wrapper">
    <div class="login-box">
      <div class="login-brand">Kitoo <span>Footwear</span></div>
      <p style="font-size: 12px; color: var(--muted); margin-bottom: 20px;">Purchase Memo System</p>
      <input type="email" id="login-email" class="login-input" placeholder="Email Address">
      <input type="password" id="login-password" class="login-input" placeholder="Password">
      <button class="login-btn-submit" onclick="handleLogin()">Login</button>
    </div>
  </div>
</div>

<!-- DASHBOARD SCREEN -->
<div id="screen-dash" class="screen">
  <div class="dash-header">
    <div class="dash-brand-name">Kitoo <span>Memo</span></div>
    <div class="dash-actions">
      <button id="admin-logs-btn" class="backup-btn" style="display:none; background: var(--gold);" onclick="showLogs()">📜 Logs</button>
      <button class="dash-new-btn" onclick="newMemo()">＋ New</button>
      <button class="backup-btn" onclick="handleLogout()">Logout</button>
    </div>
  </div>
  <div class="dash-body">
    <div class="dash-stats">
      <div class="stat-card"><div class="stat-val" id="stat-total">0</div><div class="stat-label">Total Memos</div></div>
      <div class="stat-card"><div class="stat-val" id="stat-amount">৳0</div><div class="stat-label">Total Estimated</div></div>
    </div>
    <div id="memo-list">
        <div id="empty-state" style="text-align:center; padding: 40px; color: var(--muted);">Loading...</div>
    </div>
  </div>
</div>

<!-- LOGS SCREEN -->
<div id="screen-logs" class="screen">
    <div class="dash-header">
        <button class="backup-btn" onclick="showDash()">← Back</button>
        <div style="color:white">Activity Logs</div>
        <div></div>
    </div>
    <div class="dash-body">
        <div id="logs-container"></div>
    </div>
</div>

<!-- EDITOR SCREEN -->
<div id="screen-editor" class="screen">
  <div class="editor-header">
    <button class="backup-btn" onclick="showDash()">← Back</button>
    <div id="editor-title">New Memo</div>
    <button class="dash-new-btn" onclick="saveMemo()">💾 Save</button>
  </div>
  <div class="dash-body">
    <div style="background:white; padding:20px; border-radius:8px; box-shadow: var(--shadow);">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <input type="text" id="memo-num" style="font-weight:700; width:150px;" placeholder="KF-0001">
            <input type="date" id="memo-date" style="width:150px;">
        </div>
        <div class="table-section">
            <table id="memo-table">
                <thead><tr><th style="width:40px">SL</th><th>Description</th><th style="width:80px">Qty</th><th style="width:100px">Rate</th><th style="width:100px">Total</th><th></th></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
            <button onclick="addRow()" style="margin-top:10px; cursor:pointer; padding:5px 10px;">＋ Add Item</button>
        </div>
        <div style="text-align:right; font-size:20px; font-weight:700; border-top:2px solid var(--ink); padding-top:10px;">
            Total: <span id="grand-total">৳ 0.00</span>
        </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- FIREBASE SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
  import { getFirestore, collection, doc, setDoc, getDocs, deleteDoc, query, orderBy, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDqrZ85kxTp9ByuHdTy9R5WCZk44ItOO20",
    authDomain: "kitoomemo-a767f.firebaseapp.com",
    projectId: "kitoomemo-a767f",
    storageBucket: "kitoomemo-a767f.firebasestorage.app",
    messagingSenderId: "790537793318",
    appId: "1:790537793318:web:dadc6dce25de68c5dbdbe7",
    measurementId: "G-Z3BFPZ7020"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // আপনার অ্যাডমিন ইমেইল এখানে দিন
  const ADMIN_EMAIL = "marufmarlin@gmail.com"; 

  let memos = [];
  let currentId = null;

  /* ── ACTIVITY TRACKER ── */
  async function logActivity(action) {
    const user = auth.currentUser;
    if (!user) return;
    try {
      await addDoc(collection(db, "activity_logs"), {
        email: user.email,
        action: action,
        time: serverTimestamp(),
        device: navigator.userAgent.slice(0, 50)
      });
    } catch (e) { console.error(e); }
  }

  /* ── AUTH ── */
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      if(user.email === ADMIN_EMAIL) document.getElementById('admin-logs-btn').style.display = 'block';
      logActivity("Logged In");
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById('screen-dash').classList.add('active');
      await fetchMemos();
    } else {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById('screen-login').classList.add('active');
    }
  });

  window.handleLogin = async () => {
    const email = document.getElementById('login-email').value;
    const pass = document.getElementById('login-password').value;
    try { await signInWithEmailAndPassword(auth, email, pass); } catch (e) { alert("Login Failed!"); }
  };

  window.handleLogout = () => {
      logActivity("Logged Out");
      signOut(auth);
  }

  /* ── MEMO LOGIC ── */
  async function fetchMemos() {
    const q = query(collection(db, "memos"));
    const snap = await getDocs(q);
    memos = [];
    snap.forEach(doc => memos.push(doc.data()));
    renderDash();
  }

  window.renderDash = () => {
    const list = document.getElementById('memo-list');
    const empty = document.getElementById('empty-state');
    const items = list.querySelectorAll('.memo-card');
    items.forEach(i => i.remove());
    
    if (memos.length === 0) { empty.style.display = 'block'; empty.textContent = "No memos found"; } 
    else { empty.style.display = 'none'; }

    let totalAmt = 0;
    memos.sort((a,b) => new Date(b.savedAt) - new Date(a.savedAt)).forEach(m => {
      totalAmt += parseFloat(m.grandTotal || 0);
      const div = document.createElement('div');
      div.className = 'memo-card';
      div.innerHTML = `
        <div class="memo-card-info">
          <span class="memo-card-num">${m.memoNum}</span>
          <div style="font-size:12px; color:var(--muted); margin:4px 0;">${m.date}</div>
          <div class="memo-card-items">${m.preview}</div>
        </div>
        <div style="font-weight:700">৳${m.grandTotal}</div>
        <div class="memo-card-actions">
          <button class="icon-btn" onclick="editMemo('${m.id}')">✏️</button>
          <button class="icon-btn" style="color:red" onclick="deleteMemo('${m.id}')">🗑</button>
        </div>
      `;
      list.appendChild(div);
    });
    document.getElementById('stat-total').textContent = memos.length;
    document.getElementById('stat-amount').textContent = '৳' + Math.round(totalAmt).toLocaleString();
  };

  window.addRow = (data = null) => {
    const tbody = document.getElementById('table-body');
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${tbody.children.length + 1}</td>
      <td><input type="text" class="desc" value="${data?.desc || ''}"></td>
      <td><input type="number" class="qty" value="${data?.qty || ''}" oninput="updateTotals()"></td>
      <td><input type="number" class="rate" value="${data?.rate || ''}" oninput="updateTotals()"></td>
      <td class="row-total">0.00</td>
      <td><button onclick="this.closest('tr').remove(); updateTotals();">✕</button></td>
    `;
    tbody.appendChild(tr);
    updateTotals();
  };

  window.updateTotals = () => {
    let grand = 0;
    document.querySelectorAll('#table-body tr').forEach(tr => {
      const q = parseFloat(tr.querySelector('.qty').value) || 0;
      const r = parseFloat(tr.querySelector('.rate').value) || 0;
      const t = q * r;
      tr.querySelector('.row-total').textContent = t.toFixed(2);
      grand += t;
    });
    document.getElementById('grand-total').textContent = `৳ ${grand.toFixed(2)}`;
  };

  window.saveMemo = async () => {
    const rows = [];
    document.querySelectorAll('#table-body tr').forEach(tr => {
      rows.push({
        desc: tr.querySelector('.desc').value,
        qty: tr.querySelector('.qty').value,
        rate: tr.querySelector('.rate').value
      });
    });
    const memoData = {
      id: currentId || 'memo-' + Date.now(),
      memoNum: document.getElementById('memo-num').value,
      date: document.getElementById('memo-date').value,
      grandTotal: document.getElementById('grand-total').textContent.replace('৳ ', ''),
      preview: rows.map(r => r.desc).slice(0,2).join(', '),
      rows: rows,
      savedAt: new Date().toISOString()
    };
    await setDoc(doc(db, "memos", memoData.id), memoData);
    logActivity(currentId ? `Edited Memo ${memoData.memoNum}` : `Created Memo ${memoData.memoNum}`);
    window.showDash();
    fetchMemos();
  };

  window.newMemo = () => {
    currentId = null;
    document.getElementById('table-body').innerHTML = '';
    document.getElementById('memo-num').value = 'KF-' + (memos.length + 1).toString().padStart(4, '0');
    document.getElementById('memo-date').valueAsDate = new Date();
    addRow();
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-editor').classList.add('active');
  };

  window.editMemo = (id) => {
    const m = memos.find(x => x.id === id);
    currentId = id;
    document.getElementById('table-body').innerHTML = '';
    document.getElementById('memo-num').value = m.memoNum;
    document.getElementById('memo-date').value = m.date;
    m.rows.forEach(r => addRow(r));
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-editor').classList.add('active');
  };

  window.deleteMemo = async (id) => {
    if(confirm("Delete this memo?")) {
      await deleteDoc(doc(db, "memos", id));
      logActivity(`Deleted a memo`);
      fetchMemos();
    }
  };

  /* ── ADMIN LOGS LOGIC ── */
  window.showLogs = async () => {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-logs').classList.add('active');
    const container = document.getElementById('logs-container');
    container.innerHTML = "Loading logs...";
    
    const q = query(collection(db, "activity_logs"), orderBy("time", "desc"));
    const snap = await getDocs(q);
    container.innerHTML = "";
    snap.forEach(doc => {
        const data = doc.data();
        const time = data.time ? new Date(data.time.seconds * 1000).toLocaleString() : 'Just now';
        const div = document.createElement('div');
        div.className = 'log-row';
        div.innerHTML = `
            <div class="log-time">${time}</div>
            <div class="log-user">${data.email}</div>
            <div class="log-action">${data.action}</div>
        `;
        container.appendChild(div);
    });
  }

  window.showDash = () => {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-dash').classList.add('active');
  }

</script>
</body>
</html>
