<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitoo Footwear — Purchase Memo</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<!-- Vercel Web Analytics -->
<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>
<!-- Vercel Speed Insights -->
<script>
  window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
</script>
<script defer src="/_vercel/speed-insights/script.js"></script>
<style>
:root {
  --bg: #faf7f2;
  --paper: #ffffff;
  --ink: #1a1612;
  --accent: #b5451b;
  --gold: #c9922a;
  --muted: #7a6f64;
  --line: #e2d9cc;
  --soft: #f2ece3;
  --green: #2a6b45;
  --red: #c0392b;
  --shadow: 0 2px 20px rgba(0,0,0,0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  font-family: 'DM Sans', sans-serif;
  color: var(--ink);
  min-height: 100vh;
}

/* ── SCREENS ── */
.screen { display: none; }
.screen.active { display: block; }

/* ════════════════════════════════
   LOGIN SCREEN
═══════════════════════════════ */
.login-wrapper {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
}
.login-box {
  background: var(--paper);
  padding: 40px;
  border-radius: 12px;
  box-shadow: var(--shadow);
  width: 100%;
  max-width: 400px;
  text-align: center;
  border: 1px solid var(--line);
}
.login-brand {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 5px;
}
.login-brand span { color: var(--accent); }
.login-sub {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 30px;
}
.login-input {
  width: 100%;
  padding: 14px;
  margin-bottom: 15px;
  border: 1px solid var(--line);
  border-radius: 6px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  background: var(--soft);
  outline: none;
  transition: border-color 0.2s;
}
.login-input:focus { border-color: var(--gold); }
.login-btn-submit {
  width: 100%;
  background: var(--ink);
  color: #fff;
  border: none;
  padding: 14px;
  border-radius: 6px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  font-size: 15px;
  cursor: pointer;
  transition: background 0.2s;
}
.login-btn-submit:hover { background: var(--accent); }

/* ════════════════════════════════
   DASHBOARD SCREEN
═══════════════════════════════ */
.dash-header {
  background: var(--ink);
  padding: 0 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
  position: sticky;
  top: 0;
  z-index: 50;
}

.dash-brand { display: flex; align-items: baseline; gap: 10px; }
.dash-brand-name { font-family: 'Playfair Display', serif; font-size: 22px; color: #fff; font-weight: 700; }
.dash-brand-name span { color: var(--gold); }
.dash-brand-tag { font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }

.dash-actions { display:flex; gap:8px; align-items:center; }

.dash-new-btn {
  background: var(--accent); color: #fff; border: none; font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 600; padding: 9px 20px; border-radius: 40px;
  cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.2s;
}
.dash-new-btn:hover { background: #8e2e0f; transform: translateY(-1px); }

.backup-btn {
  background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7); border: 1px solid rgba(255,255,255,0.15);
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; padding: 7px 14px;
  border-radius: 40px; cursor: pointer; transition: all 0.2s;
}
.backup-btn:hover { background: rgba(255,255,255,0.18); color: #fff; }
.logout-btn { background: rgba(255,0,0,0.15); border-color: rgba(255,0,0,0.3); color: #ffcccc; }
.logout-btn:hover { background: rgba(255,0,0,0.3); color: #fff; }

.dash-body { padding: 32px; max-width: 1000px; margin: 0 auto; }

.dash-stats { display: flex; gap: 16px; margin-bottom: 28px; flex-wrap: wrap; }
.stat-card {
  background: var(--paper); border: 1px solid var(--line); border-radius: 8px;
  padding: 16px 22px; flex: 1; min-width: 130px; box-shadow: var(--shadow);
}
.stat-val { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; color: var(--accent); line-height: 1; }
.stat-label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-top: 4px; }

.section-heading { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); font-weight: 700; margin-bottom: 14px; }

.memo-list { display: flex; flex-direction: column; gap: 10px; }
.memo-card {
  background: var(--paper); border: 1px solid var(--line); border-radius: 8px;
  padding: 16px 20px; display: flex; align-items: center; gap: 16px; box-shadow: var(--shadow);
  transition: all 0.2s; cursor: default;
}
.memo-card:hover { border-color: var(--gold); transform: translateY(-1px); box-shadow: 0 4px 24px rgba(0,0,0,0.1); }

.memo-card-num {
  font-family: 'Space Mono', monospace; font-size: 11px; color: var(--accent);
  background: var(--soft); padding: 4px 8px; border-radius: 4px; flex-shrink: 0; font-weight: 700;
}
.memo-card-info { flex: 1; min-width: 0; }
.memo-card-date { font-size: 12px; color: var(--muted); margin-bottom: 2px; }
.memo-card-items { font-size: 13px; font-weight: 500; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.memo-card-total { font-family: 'Space Mono', monospace; font-size: 14px; font-weight: 700; color: var(--green); flex-shrink: 0; }
.memo-card-actions { display: flex; gap: 8px; flex-shrink: 0; }

.icon-btn {
  border: 1px solid var(--line); background: var(--soft); border-radius: 6px;
  width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 14px; transition: all 0.15s; color: var(--muted);
}
.icon-btn:hover { border-color: var(--accent); color: var(--accent); background: #fff; }
.icon-btn.del:hover { border-color: var(--red); color: var(--red); }

/* ════════════════════════════════
   MEMO EDITOR SCREEN
═══════════════════════════════ */
.editor-header {
  background: var(--ink); padding: 0 32px; display: flex; align-items: center;
  justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 50; gap: 12px;
}
.back-btn {
  background: none; border: 1px solid rgba(255,255,255,0.2); color: #fff;
  font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 6px 14px;
  border-radius: 20px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.2s; flex-shrink: 0;
}
.back-btn:hover { background: rgba(255,255,255,0.1); }
.editor-title { font-family: 'Playfair Display', serif; font-size: 16px; color: #fff; flex: 1; text-align: center; }
.editor-actions { display: flex; gap: 8px; flex-shrink: 0; }
.save-btn { background: var(--green); color: #fff; border: none; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600; padding: 7px 16px; border-radius: 20px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.2s; }
.save-btn:hover { background: #1e5233; }
.download-btn { background: var(--gold); color: #fff; border: none; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600; padding: 7px 16px; border-radius: 20px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.2s; }
.download-btn:hover { background: #a87520; }

.editor-body { padding: 24px 16px 80px; }
.page { max-width: 860px; margin: 0 auto; background: var(--paper); border-radius: 4px; box-shadow: 0 2px 40px rgba(0,0,0,0.10), 0 0 0 1px var(--line); overflow: hidden; }
.top-bar { height: 6px; background: linear-gradient(90deg, var(--accent) 0%, var(--gold) 50%, var(--accent) 100%); }

/* ── TABLES ── */
.table-section { padding: 22px 40px 16px; overflow-x: auto; }
table { width: 100%; border-collapse: collapse; min-width: 600px; }
thead tr { background: var(--ink); }
thead th { font-family: 'Space Mono', monospace; font-size: 8.5px; letter-spacing: 1.5px; text-transform: uppercase; color: #fff; padding: 10px 8px; text-align: left; font-weight: 400; }
tbody td { padding: 3px 5px; vertical-align: middle; border-bottom: 1px solid var(--line); }

/* ── ACTION BUTTONS & DRAG HANDLE ── */
.drag-handle { cursor: grab; color: #b3a89e; font-size: 18px; user-select: none; padding: 4px; }
tr.dragging { opacity: 0.6; background: var(--soft) !important; }

/* ── RESPONSIVE DESIGN ── */
@media (max-width: 768px) {
  .dash-header { padding: 0 16px; flex-direction: column; height: auto; padding-bottom: 12px; }
  .dash-brand { margin-bottom: 10px; }
  .dash-actions { width: 100%; justify-content: space-between; }
  .dash-body { padding: 16px; }
  .stat-card { min-width: 45%; }
  
  .memo-card { padding: 12px; flex-wrap: wrap; gap: 10px; }
  .memo-card-info { width: 100%; order: 1; flex: auto; }
  .memo-card-num { order: 0; }
  .memo-card-total { width: 100%; order: 2; border-top: 1px solid var(--soft); padding-top: 8px; }
  .memo-card-actions { width: 100%; order: 3; justify-content: flex-end; }
  
  .editor-header { padding: 0 12px; }
  .editor-actions .download-btn span, .save-btn span { display: none; }
}

/* Toast & Modal */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--ink); color: #fff; padding: 10px 20px; border-radius: 40px; font-size: 13px; font-weight: 500; z-index: 999; transition: transform 0.3s; pointer-events: none; white-space: nowrap; }
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ═══════════════════════════════════ LOGIN ═══════════════════════════════════ -->
<div id="screen-login" class="screen active">
  <div class="login-wrapper">
    <div class="login-box">
      <div class="login-brand">Kitoo <span>Footwear</span></div>
      <div class="login-sub">Secure Memo System</div>
      <input type="email" id="login-email" class="login-input" placeholder="Email Address">
      <input type="password" id="login-password" class="login-input" placeholder="Password">
      <button class="login-btn-submit" onclick="handleLogin()">Login to Dashboard</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════ DASHBOARD ═══════════════════════════════════ -->
<div id="screen-dash" class="screen">
  <div class="dash-header">
    <div class="dash-brand">
      <div class="dash-brand-name">Kitoo <span>Footwear</span></div>
      <div class="dash-brand-tag">Memo System</div>
    </div>
    <div class="dash-actions">
      <button class="backup-btn" onclick="importBackup()">⬆ Import</button>
      <button class="backup-btn" onclick="exportBackup()">⬇ Export</button>
      <button class="dash-new-btn" onclick="newMemo()">＋ <span>New</span></button>
      <button class="backup-btn logout-btn" onclick="handleLogout()">🚪</button>
    </div>
  </div>

  <div class="dash-body">
    <div class="dash-stats">
      <div class="stat-card">
        <div class="stat-val" id="stat-total">0</div>
        <div class="stat-label">Total Memos</div>
      </div>
      <div class="stat-card" style="width: 100%;">
        <div class="stat-val" id="stat-amount">৳0</div>
        <div class="stat-label">Total Estimated</div>
      </div>
    </div>

    <div class="section-label">History (Cloud)</div>
    <div class="memo-list" id="memo-list">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">📋</div>
        <div class="empty-title">Loading...</div>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════ EDITOR ═══════════════════════════════════ -->
<div id="screen-editor" class="screen">
  <div class="editor-header">
    <button class="back-btn" onclick="goBack()">← Back</button>
    <div class="editor-title" id="editor-title">New Memo</div>
    <div class="editor-actions">
      <button class="save-btn" onclick="saveMemo()">💾 <span>Save</span></button>
      <button class="download-btn" onclick="downloadMemo()">⬇ <span>HTML</span></button>
    </div>
  </div>

  <div class="editor-body">
    <div class="page" id="memo-page">
      <div class="top-bar"></div>
      <div style="padding: 30px 40px;">
          <h2 style="font-family:'Playfair Display'; font-size:32px;">Kitoo <span>Footwear</span></h2>
          <p style="color:var(--gold); font-family:'Space Mono'; font-size:10px; letter-spacing:2px;">Comfort in every step</p>
      </div>

      <div style="padding: 15px 40px; background: var(--soft); border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px;">
        <input type="text" id="memo-num" placeholder="KF-0001" style="border:none; background:transparent; font-weight:700;">
        <input type="date" id="memo-date" style="border:none; background:transparent;">
      </div>

      <div class="table-section">
        <button class="add-row-btn" onclick="addRow()" style="margin-bottom:10px; padding:5px 15px; cursor:pointer;">＋ Add Item</button>
        <table id="memo-table">
          <thead>
            <tr>
              <th style="width:24px"></th>
              <th style="width:40px">SL</th>
              <th>Description</th>
              <th style="width:60px">Qty</th>
              <th style="width:80px">Rate</th>
              <th style="width:100px">Total</th>
              <th style="width:30px"></th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>

      <div class="totals-section" style="padding: 20px 40px; text-align:right;">
          <div style="background:var(--ink); color:white; padding:15px; border-radius:4px; display:inline-block; min-width:200px;">
            <p style="font-size:10px; text-transform:uppercase; letter-spacing:1px; margin-bottom:5px;">Grand Total</p>
            <h3 id="grand-total" style="font-family:'Space Mono'; font-size:24px; color:var(--gold);">৳ 0.00</h3>
          </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- ═══════════════════════════════════ SCRIPTS ═══════════════════════════════════ -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
  import { getFirestore, collection, doc, setDoc, getDocs, deleteDoc, query } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDqrZ85kxTp9ByuHdTy9R5WCZk44ItOO20",
    authDomain: "kitoomemo-a767f.firebaseapp.com",
    projectId: "kitoomemo-a767f",
    storageBucket: "kitoomemo-a767f.firebasestorage.app",
    messagingSenderId: "790537793318",
    appId: "1:790537793318:web:dadc6dce25de68c5dbdbe7",
    measurementId: "G-Z3BFPZ7020"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let memos = [];
  let currentId = null;
  let rowCount = 0;
  window.dragSrcEl = null;

  /* --- AUTH --- */
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      document.getElementById('screen-login').classList.remove('active');
      document.getElementById('screen-dash').classList.add('active');
      await fetchMemos();
    } else {
      document.getElementById('screen-dash').classList.remove('active');
      document.getElementById('screen-login').classList.add('active');
    }
  });

  window.handleLogin = async () => {
    const email = document.getElementById('login-email').value;
    const pass = document.getElementById('login-password').value;
    try { await signInWithEmailAndPassword(auth, email, pass); } catch (e) { alert("Login Failed!"); }
  };

  window.handleLogout = () => signOut(auth);

  /* --- DATA --- */
  async function fetchMemos() {
    const q = query(collection(db, "memos"));
    const snap = await getDocs(q);
    memos = [];
    snap.forEach(doc => memos.push(doc.data()));
    renderDash();
  }

  window.renderDash = () => {
    const list = document.getElementById('memo-list');
    document.getElementById('empty-state').style.display = memos.length ? 'none' : 'block';
    
    document.getElementById('stat-total').textContent = memos.length;
    const total = memos.reduce((sum, m) => sum + (parseFloat(m.grandTotal) || 0), 0);
    document.getElementById('stat-amount').textContent = '৳' + Math.round(total).toLocaleString('en-IN');

    list.querySelectorAll('.memo-card').forEach(c => c.remove());
    memos.sort((a,b) => new Date(b.savedAt) - new Date(a.savedAt)).forEach(m => {
      const div = document.createElement('div');
      div.className = 'memo-card';
      div.innerHTML = `
        <div class="memo-card-num">${m.memoNum || 'N/A'}</div>
        <div class="memo-card-info">
          <div class="memo-card-date">${m.date}</div>
          <div class="memo-card-items">${m.preview}</div>
        </div>
        <div class="memo-card-total">৳ ${m.grandTotal}</div>
        <div class="memo-card-actions">
          <button class="icon-btn" onclick="viewMemo('${m.id}')">👁️</button>
          <button class="icon-btn" onclick="editMemo('${m.id}')">✏️</button>
          <button class="icon-btn del" style="color:red;" onclick="deleteMemo('${m.id}')">🗑</button>
        </div>
      `;
      list.appendChild(div);
    });
  };

  /* --- EDITOR --- */
  window.addRow = (data = null) => {
    rowCount++;
    const tr = document.createElement('tr');
    tr.id = `row-${rowCount}`;
    tr.setAttribute('draggable', 'false');
    tr.innerHTML = `
      <td class="drag-handle" onmousedown="this.closest('tr').setAttribute('draggable', 'true')" onmouseup="this.closest('tr').setAttribute('draggable', 'false')">⋮⋮</td>
      <td class="sl-num">0</td>
      <td><input type="text" class="desc" value="${data?.desc || ''}"></td>
      <td><input type="number" class="qty" value="${data?.qty || ''}" oninput="updateTotals()"></td>
      <td><input type="number" class="rate" value="${data?.rate || ''}" oninput="updateTotals()"></td>
      <td class="row-total">0.00</td>
      <td><button onclick="this.closest('tr').remove(); updateTotals();" style="border:none; background:none; cursor:pointer;">✕</button></td>
    `;
    
    // Drag and Drop Listeners
    tr.addEventListener('dragstart', handleDragStart);
    tr.addEventListener('dragover', handleDragOver);
    tr.addEventListener('drop', handleDrop);
    tr.addEventListener('dragend', handleDragEnd);

    document.getElementById('table-body').appendChild(tr);
    updateTotals();
  };

  function handleDragStart(e) { window.dragSrcEl = this; this.classList.add('dragging'); }
  function handleDragOver(e) { e.preventDefault(); return false; }
  function handleDrop(e) {
    if (window.dragSrcEl != this) {
      const tbody = this.parentNode;
      const allRows = [...tbody.children];
      if (allRows.indexOf(window.dragSrcEl) < allRows.indexOf(this)) tbody.insertBefore(window.dragSrcEl, this.nextSibling);
      else tbody.insertBefore(window.dragSrcEl, this);
      window.renumberRows();
    }
    return false;
  }
  function handleDragEnd() { this.classList.remove('dragging'); this.setAttribute('draggable', 'false'); window.renumberRows(); }

  window.renumberRows = () => {
    document.querySelectorAll('#table-body tr').forEach((tr, i) => {
      tr.querySelector('.sl-num').textContent = (i + 1);
    });
  };

  window.updateTotals = () => {
    let grand = 0;
    document.querySelectorAll('#table-body tr').forEach(tr => {
      const q = parseFloat(tr.querySelector('.qty').value) || 0;
      const r = parseFloat(tr.querySelector('.rate').value) || 0;
      const t = q * r;
      tr.querySelector('.row-total').textContent = t.toFixed(2);
      grand += t;
    });
    document.getElementById('grand-total').textContent = `৳ ${grand.toLocaleString('en-IN')}`;
    window.renumberRows();
  };

  window.saveMemo = async () => {
    const rows = [];
    document.querySelectorAll('#table-body tr').forEach(tr => {
      rows.push({
        desc: tr.querySelector('.desc').value,
        qty: tr.querySelector('.qty').value,
        rate: tr.querySelector('.rate').value
      });
    });
    const memoData = {
      id: currentId || 'memo-' + Date.now(),
      memoNum: document.getElementById('memo-num').value,
      date: document.getElementById('memo-date').value,
      grandTotal: document.getElementById('grand-total').textContent.replace('৳ ', ''),
      preview: rows.map(r => r.desc).slice(0,2).join(', '),
      rows: rows,
      savedAt: new Date().toISOString()
    };
    await setDoc(doc(db, "memos", memoData.id), memoData);
    showToast("Saved!");
    window.goBack();
    fetchMemos();
  };

  window.newMemo = () => {
    currentId = null;
    document.getElementById('table-body').innerHTML = '';
    document.getElementById('memo-num').value = 'KF-' + (memos.length + 1).toString().padStart(4, '0');
    document.getElementById('memo-date').valueAsDate = new Date();
    addRow();
    document.getElementById('screen-dash').classList.remove('active');
    document.getElementById('screen-editor').classList.add('active');
  };

  window.editMemo = (id) => {
    const m = memos.find(x => x.id === id);
    currentId = id;
    document.getElementById('table-body').innerHTML = '';
    document.getElementById('memo-num').value = m.memoNum;
    document.getElementById('memo-date').value = m.date;
    m.rows.forEach(r => addRow(r));
    document.getElementById('screen-dash').classList.remove('active');
    document.getElementById('screen-editor').classList.add('active');
  };

  window.deleteMemo = async (id) => {
    if(confirm("Delete this memo?")) {
      await deleteDoc(doc(db, "memos", id));
      fetchMemos();
    }
  };

  window.viewMemo = (id) => {
    const m = memos.find(x => x.id === id);
    if (!m) return;
    const html = `<html><body style="font-family:sans-serif; padding:40px;">
      <h2>Kitoo Footwear - Memo ${m.memoNum}</h2>
      <p>Date: ${m.date}</p>
      <table border="1" width="100%" style="border-collapse:collapse;">
        <thead><tr><th>SL</th><th>Description</th><th>Qty</th><th>Rate</th><th>Total</th></tr></thead>
        <tbody>${m.rows.map((r,i)=>`<tr><td>${i+1}</td><td>${r.desc}</td><td>${r.qty}</td><td>${r.rate}</td><td>${(r.qty*r.rate).toFixed(2)}</td></tr>`).join('')}</tbody>
      </table>
      <h3 align="right">Grand Total: ৳ ${m.grandTotal}</h3>
      <button onclick="window.print()">Print Memo</button>
      <button onclick="window.location.reload()">Back</button>
    </body></html>`;
    document.write(html);
  };

  window.goBack = () => {
    document.getElementById('screen-editor').classList.remove('active');
    document.getElementById('screen-dash').classList.add('active');
  };

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }
</script>
</body>
</html>
